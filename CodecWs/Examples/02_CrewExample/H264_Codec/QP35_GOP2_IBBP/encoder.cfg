# JSVM Configuration for CIF (352x288) - GOP Structure Example 2
# SequenceFormatString: A0*n{P2b0b1} - IBBP pattern with B-frames
# IDR B B P B B P ... (B frames not stored as reference)
# Coding Order: 0 2 3 1 5 6 4 ... (requires reordering)

#====================== GENERAL ================================================
AVCMode                 1          # AVC compatible mode
InputFile               ..\..\YUV_Video\input.yuv
OutputFile              encoded.264
ReconFile               reconstructed.yuv
SourceWidth             352        # CIF width
SourceHeight            288        # CIF height
FrameRate               30.0       # frame rate [Hz]
FramesToBeEncoded       300        # All frames @ 30fps

#====================== CODING =================================================
SymbolMode              1          # 0=CAVLC, 1=CABAC
Enable8x8Transform      1          # 8x8 luma transform
ConstrainedIntraPred    0          # constrained intra prediction
ScalingMatricesPresent  1          # scaling matrices
BiPred8x8Disable        0          # bi-predicted blocks < 8x8
MCBlocksLT8x8Disable    0          # blocks smaller than 8x8
BasisQP                 35         # Quantization parameter

#====================== STRUCTURE ==============================================
DPBSize                 4          # decoded picture buffer in frames
NumRefFrames            2          # maximum number of stored reference frames
Log2MaxFrameNum         9          # specifies max value for frame_num
Log2MaxPocLsb           8          # specifies coding of POC
# Example 2: IBBP - Simpler B-frame pattern with P then B frames
# Using all lowercase b for non-reference B-frames for better JSVM compatibility
SequenceFormatString    A0L0*n{P1b0}  # IDR P B P B P B ... (GOP=2, simple)
DeltaLayer0Quant        0          # QP offset for layer 0 (P-frames)
DeltaLayer1Quant        2          # QP offset for layer 1 (B-frames, +2 QP)
MaxRefIdxActiveBL0      2          
MaxRefIdxActiveBL1      2          
MaxRefIdxActiveP        2          

#============================== MOTION SEARCH ==================================
SearchMode              4          # 4=Fast search
SearchFuncFullPel       0          # Hadamard
SearchFuncSubPel        2          # Hadamard
SearchRange             64         # Search range (full pel)
BiPredIter              4          # Iterations for bi-pred
IterSearchRange         8          # Search range for iterations

#============================== LOOP FILTER ====================================
LoopFilterDisable       0          # 0=on
LoopFilterAlphaC0Offset 0          
LoopFilterBetaOffset    0          
